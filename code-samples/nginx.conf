# [발췌: nginx.conf — 원본 그대로]
#
# 이 설정이 보여주는 것: "배포해도 사용자에게 옛 버전이 보이는" PWA 캐시 고착
# 사고를 해결한 캐시 계층 전략.
#  - 갱신의 진입점(index.html, sw.js 등)은 no-cache로 매번 재검증
#  - 파일명에 콘텐츠 해시가 붙는 /assets/* 는 1년 immutable 캐시
# 그리고 프록시에서 X-Forwarded-For를 전달해 백엔드의 사용자별 rate limit이
# 실제 클라이언트 IP로 동작하게 한다.

server {
    listen 80;
    server_name localhost;

    # Increase upload size limit to 10MB (matching backend limit)
    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend Static Files & SPA Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA 셸 & 서비스워커: 항상 재검증 (옛 버전 고착 방지)
    # no-cache는 Cloudflare/브라우저가 매번 원본을 확인하게 함.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 해시가 붙은 정적 자산(파일명이 바뀌므로 안전하게 장기 캐시)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://clause-guard-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Real IP Forwarding (for Rate Limiting)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
